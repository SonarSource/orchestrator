---
name: sonar-release
# This workflow is triggered when publishing a new github release
# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@c52861bb0e5dd564187f3fd74e048f20aef0f761 # 6.5.0
    with:
      publishToBinaries: true  # disabled by default
      mavenCentralSync: true   # disabled by default
      mavenCentralSyncExclusions: "*echo*"
      slackChannel: squad-sq-platform-build-notification
